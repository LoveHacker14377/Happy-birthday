<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Dearest Ashwini ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&f[]=playfair-display@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #2a0a2a;
            --primary-color: #ff3879;
            --secondary-color: #ff74a4;
            --accent-glow: rgba(255, 100, 150, 0.6);
            --card-bg: rgba(255, 150, 200, 0.15);
            --card-border: rgba(255, 200, 220, 0.3);
            --text-light: #fce7f3;
        }

        body {
            font-family: 'Satoshi', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        #aurora-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(at 15% 15%, hsla(330, 80%, 75%, .4) 0px, transparent 60%),
                        radial-gradient(at 85% 20%, hsla(300, 70%, 70%, .3) 0px, transparent 60%),
                        radial-gradient(at 20% 85%, hsla(350, 90%, 80%, .3) 0px, transparent 60%);
            background-size: 200% 200%;
            animation: aurora-flow 15s infinite alternate ease-in-out;
        }

        @keyframes aurora-flow {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .step {
            position: absolute;
            top: 50%; left: 50%;
            width: 90%; max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            border-radius: 2.5rem;
            padding: 3rem 2rem;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            pointer-events: none;
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .step.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        .btn {
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(255, 56, 121, 0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            cursor: pointer;
            border: none;
            color: white;
        }

        .btn:hover { transform: scale(1.1) translateY(-5px); box-shadow: 0 15px 30px var(--accent-glow); }

        .text-gradient {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(to right, #ffc2e2, #ffffff, #ffc2e2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .heart-beat { animation: heartbeat 1.2s infinite ease-in-out; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }

        #canvas-container { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="click-sfx"><source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div id="aurora-background"></div>
    <div id="canvas-container"></div>

    <main id="app">
        <div id="step1" class="step active">
            <div class="text-7xl mb-6 heart-beat">❤️</div>
            <h1 class="text-gradient mb-4">Hello, My Darling.</h1>
            <p class="text-pink-100 text-lg mb-10">Every beat of my heart whispers your name, <b>Ashwini</b>.</p>
            <button id="start-btn" class="btn">Unwrap My Feelings</button>
        </div>

        <div id="step2" class="step">
            <div class="text-7xl mb-6">🎁</div>
            <h2 class="text-gradient mb-4">It's a Special Day!</h2>
            <p class="text-lg mb-10">Today, the most beautiful soul was born. My world, My Everything.</p>
            <button id="next-btn-2" class="btn">Click to See...</button>
        </div>

        <div id="step3" class="step">
            <div class="text-7xl mb-6">🎂</div>
            <h2 class="text-gradient mb-2">Happy Birthday, Ashwini!</h2>
            <p class="text-pink-200 text-xl font-bold mb-8 italic">"Happy Birthday, My Darling!"</p>
            <button id="celebrate-btn" class="btn">Celebrate Us! 💖</button>
            <div id="final-wish" class="mt-8 opacity-0 transition-all duration-1000">
                <p class="text-2xl font-bold text-white mb-2">I Love You Forever! 💍</p>
                <p class="text-pink-300">You are my Queen. 👑</p>
            </div>
        </div>
    </main>

    <script>
        let scene, camera, renderer, hearts = [];
        const bgMusic = document.getElementById('bg-music');
        const clickSfx = document.getElementById('click-sfx');

        // Function to play "Happy Birthday Darling" voice
        function speakWish() {
            const msg = new SpeechSynthesisUtterance();
            msg.text = "Happy Birthday, My Darling Ashwini!";
            msg.rate = 0.9; // Normal speed
            msg.pitch = 1.2; // Slightly sweet tone
            window.speechSynthesis.speak(msg);
        }

        function playClick() { clickSfx.currentTime = 0; clickSfx.play(); }

        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const heartShape = new THREE.Shape();
            heartShape.moveTo(25, 25);
            heartShape.bezierCurveTo(25, 25, 20, 0, 0, 0);
            heartShape.bezierCurveTo(-30, 0, -30, 35, -30, 35);
            heartShape.bezierCurveTo(-30, 55, -10, 77, 25, 95);
            heartShape.bezierCurveTo(60, 77, 80, 55, 80, 35);
            heartShape.bezierCurveTo(80, 35, 80, 0, 50, 0);
            heartShape.bezierCurveTo(35, 0, 25, 25, 25, 25);

            const geometry = new THREE.ExtrudeGeometry(heartShape, { depth: 2, bevelEnabled: true, bevelSize: 1 });
            const colors = [0xff3879, 0xff74a4, 0xffc0cb];

            for(let i=0; i<25; i++) {
                const material = new THREE.MeshPhongMaterial({ color: colors[i%3], shininess: 100 });
                const heart = new THREE.Mesh(geometry, material);
                heart.scale.set(0.045, 0.045, 0.045);
                heart.position.set((Math.random()-0.5)*80, (Math.random()-0.5)*80, (Math.random()-0.5)*20);
                heart.userData = { speed: Math.random() * 0.02 + 0.01 };
                hearts.push(heart);
                scene.add(heart);
            }
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1);
            scene.add(light);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            hearts.forEach(h => {
                h.rotation.y += h.userData.speed;
                h.position.y += Math.sin(Date.now()*0.001)*0.02;
            });
            renderer.render(scene, camera);
        }

        function showStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
        }

        // Navigation Listeners
        document.getElementById('start-btn').onclick = () => {
            playClick();
            bgMusic.volume = 0.2;
            bgMusic.play().catch(() => {});
            showStep(2);
        };

        document.getElementById('next-btn-2').onclick = () => {
            playClick();
            showStep(3);
        };

        document.getElementById('celebrate-btn').onclick = () => {
            // Voice Wish
            speakWish();
            
            // Confetti
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#ff3879', '#ffffff', '#ff74a4'] });
            
            // Show Final Text
            const finalDiv = document.getElementById('final-wish');
            finalDiv.style.opacity = '1';
            finalDiv.style.transform = 'translateY(-10px)';
            
            // Extra Fun: Burst Confetti again after 1 second
            setTimeout(() => {
                confetti({ particleCount: 100, spread: 100, origin: { y: 0.7 } });
            }, 1000);
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThreeJS();
    </script>
</body>
</html>
